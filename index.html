<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Melodious Bell Betting Pool</title>
    <style>
        :root {
            --emmaus-blue: #003366;
            --gold: #ffcc00;
            --bg: #e5e5e5;
        }


        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        .header {
            background: var(--emmaus-blue);
            color: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
            border-bottom: 5px solid var(--gold);
        }


        .progress-box {
            background: #333;
            height: 25px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #fff;
            overflow: hidden;
        }


        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            transition: width 1s ease;
        }


        .stats {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            margin-bottom: 10px;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 900px;
            margin-top: 25px;
        }


        .square {
            background: white;
            aspect-ratio: 1/1;
            border: 1px solid #bbb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            text-align: center;
            font-size: 0.85rem;
            padding: 5px;
        }


        .square:hover:not(.sold) { background: #fff9e6; border-color: var(--gold); }


        .square.sold {
            background: #222;
            color: var(--gold);
            cursor: not-allowed;
            border-color: #000;
        }


        .square strong { display: block; color: var(--emmaus-blue); margin-bottom: 4px; }
        .square.sold strong { color: white; }


        #adminPanel {
            display: none;
            background: white;
            padding: 20px;
            border: 2px solid red;
            margin-top: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
        }


        .admin-trigger {
            margin-top: 50px;
            opacity: 0.05;
            cursor: pointer;
            font-size: 0.7rem;
        }


        button {
            padding: 10px 15px;
            background: var(--emmaus-blue);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }


        input {
            padding: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>


<div class="header">
    <h2 style="margin:0">THE STRATEGIC REPLACEMENT OF THE MELODIOUS BELL</h2>
    <p>Predict the moment the bell is misplaced. Proceeds to Hays Praise Emmaus.</p>
    
    <div class="progress-box"><div id="progress-bar"></div></div>
    
    <div class="stats">
        <span>Goal: $<span id="dispGoal">1000</span></span>
        <span>Raised: $<span id="dispRaised">0</span></span>
    </div>
</div>


<div class="grid" id="grid"></div>


<div id="adminPanel">
    <h3>Admin Settings</h3>
    <p>Cost per Square ($): <input type="number" id="inCost" value="20"></p>
    <p>Fundraising Goal ($): <input type="number" id="inGoal" value="1000"></p>
    <p>Days (Comma separated): <input type="text" id="inDays" value="Friday,Saturday,Sunday"></p>
    <p>Working Hours (Start-End 24h): <input type="number" id="inStart" value="8"> to <input type="number" id="inEnd" value="18"></p>
    <button onclick="saveSettings()">Apply & Reset Grid</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:#666">Close</button>
</div>


<div class="admin-trigger" onclick="document.getElementById('adminPanel').style.display='block'">Admin Access</div>

        renderGrid();
    }
